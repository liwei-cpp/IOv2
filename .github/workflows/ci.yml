name: C++ CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - compiler: g++
            image: gcc:15
            extra_pkgs: ""
          - compiler: clang++
            image: gcc:15 # Use same base to ensure latest libstdc++
            extra_pkgs: "clang"

    container:
      image: ${{ matrix.image }}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y zlib1g-dev libbotan-2-dev valgrind locales-all make tzdata ${{ matrix.extra_pkgs }}

    - name: Run tests (Release)
      run: |
        cd test
        make -j$(nproc) test CXX=${{ matrix.compiler }} MODE=release

    - name: Run tests (Sanitizers)
      run: |
        cd test
        make -j$(nproc) test CXX=${{ matrix.compiler }} MODE=sanitizer
      env:
        ASAN_OPTIONS: halt_on_error=1
        UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

    - name: Run memory check (Valgrind)
      run: |
        cd test
        make valgrind CXX=${{ matrix.compiler }} MODE=release

  clang-tidy:
    runs-on: ubuntu-latest
    container:
      image: gcc:15
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y zlib1g-dev libbotan-2-dev make tzdata clang-tidy clang

    - name: Run clang-tidy
      run: |
        # Use default clang-tidy from the image (which will be a recent version)
        clang-tidy $(find include/common include/device -name '*.h') \
          --checks='bugprone-*,performance-*,modernize-*,cppcoreguidelines-*,-modernize-use-trailing-return-type,-cppcoreguidelines-avoid-magic-numbers,-cppcoreguidelines-pro-bounds-pointer-arithmetic,-cppcoreguidelines-pro-bounds-constant-array-index,-cppcoreguidelines-avoid-non-const-global-variables,-clang-diagnostic-pragma-once-outside-header' \
          --warnings-as-errors='bugprone-*' \
          -- -std=c++23 -x c++ -I include -I /usr/include -I /usr/include/botan-2
