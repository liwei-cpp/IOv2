name: C++ CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - compiler: g++
            image: gcc:15
            extra_pkgs: ""
          - compiler: clang++
            image: gcc:15 # Use same base to ensure latest libstdc++
            extra_pkgs: "clang"

    container:
      image: ${{ matrix.image }}

    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y zlib1g-dev libbotan-2-dev valgrind locales-all make tzdata ${{ matrix.extra_pkgs }}

    - name: Run tests (Release)
      run: |
        cd test
        make -j$(nproc) test CXX=${{ matrix.compiler }} MODE=release

    - name: Run tests (Sanitizers)
      run: |
        cd test
        make -j$(nproc) test CXX=${{ matrix.compiler }} MODE=sanitizer
      env:
        ASAN_OPTIONS: halt_on_error=1
        UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

    - name: Run memory check (Valgrind)
      run: |
        cd test
        make valgrind CXX=${{ matrix.compiler }} MODE=release

  coverage:
    runs-on: ubuntu-latest
    container:
      image: gcc:15
    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y zlib1g-dev libbotan-2-dev make tzdata lcov locales-all

    - name: Generate Coverage Report
      run: |
        cd test
        # 1. Build and run all tests in coverage mode
        make -j$(nproc) test MODE=coverage
        
        # 2. Capture coverage data
        lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch --ignore-errors inconsistent --ignore-errors negative
        
        # 3. Filter to include ONLY the 'include' directory and exclude system/test code
        lcov --extract coverage.info '*/include/*' --output-file coverage.info --ignore-errors unused
        
        # 4. Print summary to console for quick check
        lcov --list coverage.info

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        files: test/coverage.info
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}

  install-paths:
    runs-on: ubuntu-latest
    container:
      image: gcc:15
    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y zlib1g-dev libbotan-2-dev make pkg-config tzdata locales-all

    - name: Build the shared library
      run: make shared

    - name: Verify no unexpected runtime dependencies
      run: |
        # iov2_objects.cpp pulls in none of the optional converters, so the .so
        # must not depend on zlib/Botan.
        if readelf -d libiov2.so | grep -Eiq 'libz|libbotan'; then
          echo "libiov2.so unexpectedly links zlib/Botan"; exit 1
        fi

    - name: Install the shared library
      run: |
        make install-shared PREFIX=/opt/iov2
        # install-shared flips the switch in the shipped header.
        grep -q '^#define IOV2_SHARED 1' /opt/iov2/include/common/iov2_export.h

    - name: Run the full test suite against the installed shared library
      run: |
        # Consume libiov2 the real-user way: installed headers (switch already on)
        # + pkg-config for cflags/libs. Drop -I../include so only the installed
        # headers are used. The repo test/Makefile is not modified.
        export PKG_CONFIG_PATH=/opt/iov2/lib/pkgconfig
        export LD_LIBRARY_PATH=/opt/iov2/lib
        export LC_ALL=C   # tests assume the C locale (default boolalpha names, etc.)
        cd test
        make -j$(nproc) test \
          OBJ_DIR=obj_shared BIN_DIR=bin_shared \
          COMP_FLAGS="-Wall -Werror -Wshadow -std=c++23 -g -O2 -I. -I/usr/include/botan-2 $(pkg-config --cflags iov2-shared)" \
          LINK_FLAGS="$(pkg-config --libs iov2-shared) -lz -lbotan-2"

    - name: Install + consume in header-only mode (via pkg-config iov2)
      run: |
        # The header-only install path (make install + iov2.pc) is distinct from the
        # -I include path the build/coverage jobs use; exercise it so the install
        # target, iov2.pc, and the shipped switch-off header stay covered.
        make install PREFIX=/opt/iov2-ho
        # Header-only: the shipped switch must stay commented out.
        if grep -q '^#define IOV2_SHARED 1' /opt/iov2-ho/include/common/iov2_export.h; then
          echo "header-only install must NOT flip the IOV2_SHARED switch"; exit 1
        fi
        printf '%s\n' '#include <io/objects/out_impl.h>' \
          'int main() { IOv2::cout << "iov2 header-only ok\n"; return 0; }' > consumer_ho.cpp
        export PKG_CONFIG_PATH=/opt/iov2-ho/lib/pkgconfig
        g++ -std=c++23 -D_POSIX_C_SOURCE=200809L $(pkg-config --cflags iov2) \
            consumer_ho.cpp -o consumer_ho $(pkg-config --libs iov2)
        ./consumer_ho | grep -q 'iov2 header-only ok'

    - name: Run the full test suite against the installed header-only library
      run: |
        export PKG_CONFIG_PATH=/opt/iov2-ho/lib/pkgconfig
        export LC_ALL=C
        cd test
        make -j$(nproc) test \
          OBJ_DIR=obj_ho BIN_DIR=bin_ho \
          COMP_FLAGS="-Wall -Werror -Wshadow -std=c++23 -g -O2 -I. -I/usr/include/botan-2 $(pkg-config --cflags iov2)" \
          LINK_FLAGS="-lz -lbotan-2"

  clang-tidy:
    runs-on: ubuntu-latest
    container:
      image: gcc:15
    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y zlib1g-dev libbotan-2-dev make tzdata clang-tidy clang

    - name: Run clang-tidy
      run: |
        # Use default clang-tidy from the image (which will be a recent version)
        clang-tidy $(find include/common include/device include/cvt include/facet -name '*.h') \
          --checks='bugprone-*,performance-*,modernize-*,cppcoreguidelines-*,-modernize-use-trailing-return-type,-cppcoreguidelines-avoid-magic-numbers,-cppcoreguidelines-pro-bounds-pointer-arithmetic,-cppcoreguidelines-pro-bounds-constant-array-index,-cppcoreguidelines-avoid-non-const-global-variables,-cppcoreguidelines-pro-bounds-avoid-unchecked-container-access,-clang-diagnostic-pragma-once-outside-header' \
          --warnings-as-errors='bugprone-*' \
          -- -std=c++23 -x c++ -I include -I /usr/include -I /usr/include/botan-2
