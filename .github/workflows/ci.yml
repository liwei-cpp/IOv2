name: C++ CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        compiler: [g++-15, clang++-19]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y zlib1g-dev libbotan-2-dev valgrind locales-all curl gpg
        # GCC 15 and Clang 19 setup
        sudo mkdir -p /etc/apt/keyrings
        # Toolchain PPA key
        curl -fsSL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x60C315A74569103E357309220AD30582EB04A1F6" | sudo gpg --dearmor -o /etc/apt/keyrings/ubuntu-toolchain-r.gpg
        echo "deb [signed-by=/etc/apt/keyrings/ubuntu-toolchain-r.gpg] https://ppa.launchpadcontent.net/ubuntu-toolchain-r/test/ubuntu/ noble main" | sudo tee /etc/apt/sources.list.d/ubuntu-toolchain-r.list
        # LLVM repository key
        curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/llvm.gpg
        echo "deb [signed-by=/etc/apt/keyrings/llvm.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm.list
        sudo apt-get update
        sudo apt-get install -y g++-15 clang-19 libasan8 libubsan1

    - name: Run tests (Release)
      run: |
        cd test
        make -j$(nproc) test CXX=${{ matrix.compiler }} MODE=release

    - name: Run tests (Sanitizers)
      run: |
        cd test
        make -j$(nproc) test CXX=${{ matrix.compiler }} MODE=sanitizer
      env:
        ASAN_OPTIONS: halt_on_error=1
        UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1

    - name: Run memory check (Valgrind)
      run: |
        cd test
        make valgrind CXX=${{ matrix.compiler }} MODE=release

  clang-tidy:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y zlib1g-dev libbotan-2-dev curl gpg
        # GCC 15 and Clang 19 setup (needed for standard library headers)
        sudo mkdir -p /etc/apt/keyrings
        # Toolchain PPA key
        curl -fsSL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x60C315A74569103E357309220AD30582EB04A1F6" | sudo gpg --dearmor -o /etc/apt/keyrings/ubuntu-toolchain-r.gpg
        echo "deb [signed-by=/etc/apt/keyrings/ubuntu-toolchain-r.gpg] https://ppa.launchpadcontent.net/ubuntu-toolchain-r/test/ubuntu/ noble main" | sudo tee /etc/apt/sources.list.d/ubuntu-toolchain-r.list
        # LLVM repository key
        curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/llvm.gpg
        echo "deb [signed-by=/etc/apt/keyrings/llvm.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm.list
        sudo apt-get update
        sudo apt-get install -y clang-tidy-19 clang-19 g++-15

    - name: Run clang-tidy
      run: |
        clang-tidy-19 $(find include/common include/device -name '*.h') \
          --checks='bugprone-*,performance-*,modernize-*,cppcoreguidelines-*,-modernize-use-trailing-return-type,-cppcoreguidelines-avoid-magic-numbers,-cppcoreguidelines-pro-bounds-pointer-arithmetic,-cppcoreguidelines-pro-bounds-constant-array-index,-cppcoreguidelines-avoid-non-const-global-variables,-clang-diagnostic-pragma-once-outside-header' \
          --warnings-as-errors='bugprone-*' \
          -- -std=c++23 -x c++ -I include -I /usr/include -I /usr/include/botan-2
